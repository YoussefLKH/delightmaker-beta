<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Signing in… — Delightmaker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background:  #FAF7F2;
      display:     flex;
      align-items: center;
      justify-content: center;
      min-height:  100vh;
    }

    .card {
      background:    #fff;
      border-radius: 20px;
      padding:       48px 40px;
      text-align:    center;
      box-shadow:    0 4px 24px rgba(0,0,0,0.08);
      max-width:     400px;
      width:         90%;
    }

    .icon { font-size: 3rem; margin-bottom: 16px; }

    h1 {
      font-size:   1.4rem;
      font-weight: 700;
      color:       #1a1a2e;
      margin-bottom: 8px;
    }

    p {
      color:       #888;
      font-size:   0.9rem;
      line-height: 1.5;
    }

    .spinner {
      width:         36px;
      height:        36px;
      border:        3px solid rgba(198,98,40,0.2);
      border-top:    3px solid #C66228;
      border-radius: 50%;
      animation:     spin 0.8s linear infinite;
      margin:        24px auto 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-msg {
      color:         #C62828;
      background:    #FFEBEE;
      border-radius: 10px;
      padding:       14px 18px;
      margin-top:    20px;
      font-size:     0.88rem;
      display:       none;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="icon">👁</div>
    <h1 id="cardTitle">Entering company view…</h1>
    <p id="cardSub">Signing you in as <strong id="companyNameEl">the company</strong></p>
    <div class="spinner" id="spinner"></div>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <script src="/js/firebase-config.js"></script>
  <script>
    (async () => {
      const params      = new URLSearchParams(window.location.search);
      const token       = params.get('token');
      const companyName = params.get('company') || 'this company';

      document.getElementById('companyNameEl').textContent = companyName;

      function showError(msg) {
        document.getElementById('spinner').style.display = 'none';
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
        document.getElementById('cardTitle').textContent = 'Sign-in failed';
      }

      if (!token) {
        showError('No token provided. Close this tab and try again from the admin dashboard.');
        return;
      }

      try {
        // Sign out any existing session first
        await firebase.auth().signOut();

        // Sign in with the custom token generated by the backend
        await firebase.auth().signInWithCustomToken(token);

        // Store impersonation flag so company pages can show the banner
        sessionStorage.setItem('impersonating', '1');
        sessionStorage.setItem('impersonatingCompany', companyName);

        // Redirect to company dashboard
        window.location.href = '/company/dashboard.html';

      } catch (err) {
        console.error('Custom token sign-in failed:', err);
        showError(
          err.code === 'auth/invalid-custom-token'
            ? 'Token is invalid or has expired. Please try again.'
            : `Sign-in error: ${err.message}`
        );
      }
    })();
  </script>

</body>
</html>
